name: Lint to the Future Dashboard

on:
  push:
    branches:
      - master
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: mansona/lttf-dashboard@v1.4
        with:
          token: ${{secrets.GITHUB_TOKEN}}
          cache: pnpm